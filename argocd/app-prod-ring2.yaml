apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-app-prod-ring2
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: kargo-playground:prod-ring2
spec:
  project: default
  source:
    repoURL: https://github.com/p8r-the-gr8/kargo-playground.git
    targetRevision: stage/prod-ring2
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: web-app-prod-ring2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
