apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-content
data:
  index.html: |-
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Web App - Production (Ring 2)</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          display: flex; justify-content: center; align-items: center;
          min-height: 100vh;
          background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
          color: #fff;
        }
        .card {
          background: rgba(255,255,255,0.15);
          backdrop-filter: blur(10px);
          border-radius: 16px; padding: 48px 64px;
          text-align: center;
          box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .env { font-size: 1rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.9; }
        .version { font-size: 5rem; font-weight: 700; margin: 16px 0; }
        .label { font-size: 1.1rem; opacity: 0.8; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="env">production (ring 2)</div>
        <div class="version">v1</div>
        <div class="label">web-app</div>
      </div>
    </body>
    </html>
